<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Dara Horizon - Grid Šifrovač</title>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding-bottom: 240px; }
        .map-container { position: relative; display: inline-block; width: 100%; }
        #mapImage { display: block; width: 100%; height: auto; }
        
        /* Zvýraznění čtverce */
        #gridHighlight {
            position: absolute;
            background-color: rgba(255, 59, 48, 0.4); /* Červená s průhledností */
            border: 2px solid rgba(255, 255, 255, 0.8);
            display: none;
            pointer-events: none;
            box-sizing: border-box;
        }

        .info-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(28, 28, 30, 0.95); padding: 15px; z-index: 1000; }
        .keyword-container { display: flex; align-items: center; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        input { flex: 1; background: transparent; border: none; color: #fff; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        .results { display: flex; gap: 10px; margin-bottom: 10px; }
        .box { flex: 1; background: #444; padding: 10px; border-radius: 8px; text-align: center; }
        .nato { background: #555; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; border-left: 4px solid #ff9500; }
    </style>
</head>
<body>

    <div class="map-container" id="mapContainer">
        <img id="mapImage" src="mapa.png">
        <div id="gridHighlight"></div>
    </div>

    <div class="info-panel">
        <div class="keyword-container">
            <label>KLÍČ:</label>
            <input type="text" id="ramrodKeyword" maxlength="10" placeholder="BLACKHORSE">
        </div>
        <div class="results">
            <div class="box"><span id="rawCoords">--- ---</span></div>
            <div class="box"><span id="ramrodCode" style="color:#ff9500">--- ---</span></div>
        </div>
        <div id="natoCallout" class="nato">Klikni na čtverec...</div>
    </div>

    <script>
        const mapImage = document.getElementById('mapImage');
        const highlight = document.getElementById('gridHighlight');
        const keywordInput = document.getElementById('ramrodKeyword');

        // Kalibrace (nyní stačí hrubší, protože se zaokrouhluje na celé čtverce)
        const xMin = 329.0, xMax = 351.0, yMin = 631.0, yMax = 646.0;

        mapImage.addEventListener('click', function(e) {
            const rect = mapImage.getBoundingClientRect();
            const w = rect.width, h = rect.height;
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Výpočet MGRS
            const valX = xMin + (x / w) * (xMax - xMin);
            const valY = yMax - (y / h) * (yMax - yMin);
            
            const gridX = Math.floor(valX);
            const gridY = Math.floor(valY);

            // Zobrazení čtverce (přepočet zpět na pixely pro vykreslení obdélníku)
            const boxW = w / (xMax - xMin);
            const boxH = h / (yMax - yMin);
            
            highlight.style.width = boxW + 'px';
            highlight.style.height = boxH + 'px';
            highlight.style.left = ((gridX - xMin) * boxW) + 'px';
            highlight.style.top = ((yMax - gridY) * boxH) + 'px';
            highlight.style.display = 'block';

            updateValues(gridX, gridY);
        });

        function updateValues(gx, gy) {
            const sx = String(gx).padStart(3, '0');
            const sy = String(gy).padStart(3, '0');
            document.getElementById('rawCoords').textContent = `${sx} ${sy}`;
            
            const key = keywordInput.value.padEnd(10, 'X');
            const codeX = sx.split('').map(d => key[d]).join('');
            const codeY = sy.split('').map(d => key[d]).join('');
            document.getElementById('ramrodCode').textContent = `${codeX} ${codeY}`;
            document.getElementById('natoCallout').textContent = "PŘIPRAVENO K HLÁŠENÍ";
        }
    </script>
</body>
</html>
